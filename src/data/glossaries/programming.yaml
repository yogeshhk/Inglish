# Programming Domain Glossary
# Terms listed here are bracketed before LLM translation so they are
# preserved as English technical terms in the output.
#
# WHAT TO PUT HERE: Nouns, concepts, data structures, proper technical names
#   — things whose English form professionals actually use when speaking.
#
# WHAT NOT TO PUT HERE: Verbs (iterate, compile, assign, return...)
#   — the LLM translates these naturally with correct conjugation and
#   produces proper Devanagari (इटरेट करता है, कंपाइल करता है, etc.)

