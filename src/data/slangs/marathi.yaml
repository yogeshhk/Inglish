# Podcast structure prompt template
podcast_prompt_template: |
  You are writing a fun, engaging Marathi-English (Marathlish) podcast script between two friends:
  - BUNTY (male): {bunty_personality}
  - BUBLY (female): {bubly_personality}

  CONTENT TO DISCUSS:
  {content}

  RULES (follow all strictly):
  1. Write exactly {num_turns} dialogue turns, alternating between Bunty and Bubly.
      Start with Bubly greeting Bunty and introducing the topic energetically.
  2. Keep ALL technical terms exactly as they appear in the content — do NOT translate them.
      Technical terms like "function", "array", "for loop", "neural network" stay as-is.
  3. Use natural Marathlish — mix Marathi and English the way Pune/Mumbai people actually speak.
      Roman script only (no Devanagari). Use Marathi grammar: ahe/ahet (not hai/hain),
      cha/chi/che (not ka/ki/ke), la (not ko).
  4. Sprinkle these slangs naturally — do not force all of them:
      {slangs_list}
  5. Make it PLAYFUL and ENGAGING:
      - Bubly explains with fun analogies ("asa vichar kar jase...")
      - Bunty asks curious questions, gets confused, has "aha" moments
      - Include reactions, interruptions, and light humor
      - Add relatable Maharashtrian references (vada pav, pune traffic, IPL, misal, etc.)
      - Bunty occasionally mishears or misunderstands — Bubly corrects with laughter
  6. Structure naturally:
      - Turn 1-2: Intro and topic setup
      - Turn 3-{mid_turn}: Core concept explanation with analogies
      - Turn {mid_turn}-{penultimate_turn}: Deeper dive, questions, examples
      - Last 2 turns: Summary and fun sign-off
  7. Output FORMAT — return a JSON array only, no other text:
      [
        {{"speaker": "Bubly", "text": "Arey Bunty, aaj ekdum mast topic ahe!..."}},
        {{"speaker": "Bunty", "text": "Kai re Bubly, aaj kay shikanar aapo?..."}},
        ...
      ]

  Domain context: {domain}

  Generate the podcast script now:
