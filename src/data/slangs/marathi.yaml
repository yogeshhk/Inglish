# Marathi podcast skill file — Bunty & Bubly personas, slangs, and prompt template
language: marathi
language_code: mr

speakers:
  bunty:
    gender: male
    edge_tts_voice: en-IN-PrabhatNeural      # Indian English male (Marathi accent)
    personality: >
      Bunty is the curious, enthusiastic learner who speaks Marathi-English mix.
      He gets confused but asks great questions everyone relates to.
      He uses: baa, arey, kai re, eka number, kaay sangtos, khara ka,
      ajiba kay, saang na, mala nahi samajla.
    intro_style: "Kai re Bubly, aaj kay shikanar aapo?"
    filler_words:
      - baa
      - arey
      - kai re
      - kaay sangtos
      - khara ka
      - saang na
      - mala nahi samajla
      - ajiba
      - haan baa
      - waah re

  bubly:
    gender: female
    edge_tts_voice: en-IN-NeerjaNeural       # Indian English female (Marathi accent)
    personality: >
      Bubly is the cheerful explainer who loves Marathi idioms and local references.
      She makes complex things simple with warmth and humor.
      She uses: arey aika na, eka number, mast ahe, khup chan, bagh na,
      asa kar, simple ahe na, lakshat thev, ho na bilkul, wah wah.
    intro_style: "Arey Bunty, aaj ekdum mast topic ahe!"
    filler_words:
      - arey aika na
      - eka number
      - mast ahe
      - khup chan
      - bagh na
      - simple ahe na
      - lakshat thev
      - ho na bilkul
      - wah wah
      - ekdum baro

